name: Release (desktop installers)

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) → builds signed
# Neura installers for Windows, macOS, and Linux and attaches them to a GitHub
# Release. Manual runs (workflow_dispatch) build + upload artifacts without a
# release. Signing/notarization happen automatically IF the secrets below are
# set; otherwise the builds are produced unsigned (fine for internal testing).
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pack: pack:win
          - os: macos-latest
            pack: pack:mac
          - os: ubuntu-latest
            pack: pack:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install

      - name: Install Electron toolchain
        working-directory: interfaces/electron
        run: npm install --no-audit --no-fund

      # Export signing env ONLY when the secrets are non-empty — an empty
      # CSC_LINK makes electron-builder treat "" as a cert file path and fail
      # with "<dir> not a file". Unsigned builds skip signing entirely.
      - name: Signing environment (only if secrets set)
        shell: bash
        run: |
          add(){ [ -n "$2" ] && echo "$1=$2" >> "$GITHUB_ENV" || true; }
          add CSC_LINK "${{ secrets.CSC_LINK }}"
          add CSC_KEY_PASSWORD "${{ secrets.CSC_KEY_PASSWORD }}"
          add APPLE_ID "${{ secrets.APPLE_ID }}"
          add APPLE_APP_SPECIFIC_PASSWORD "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          add APPLE_TEAM_ID "${{ secrets.APPLE_TEAM_ID }}"
          [ -z "${{ secrets.CSC_LINK }}" ] && echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV" || true

      - name: Build + package
        working-directory: interfaces/electron
        run: npm run ${{ matrix.pack }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neura-${{ matrix.os }}
          path: |
            interfaces/electron/dist-out/*.exe
            interfaces/electron/dist-out/*.dmg
            interfaces/electron/dist-out/*.AppImage
            interfaces/electron/dist-out/*.deb
            interfaces/electron/dist-out/*.zip
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            interfaces/electron/dist-out/*.exe
            interfaces/electron/dist-out/*.dmg
            interfaces/electron/dist-out/*.AppImage
            interfaces/electron/dist-out/*.deb
