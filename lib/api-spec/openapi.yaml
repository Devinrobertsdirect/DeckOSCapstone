openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Deck OS - JARVIS Cyberdeck Command Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai-router
    description: AI Router - model detection and inference routing
  - name: plugins
    description: Plugin/Skills management
  - name: memory
    description: Memory system - short and long term storage
  - name: system
    description: System monitoring and status
  - name: commands
    description: Command execution and dispatch
  - name: devices
    description: IoT device simulation and control
  - name: events
    description: Event bus history and introspection
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ai-router/status:
    get:
      operationId: getAiRouterStatus
      tags: [ai-router]
      summary: Get AI router status and available models
      responses:
        "200":
          description: AI router status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRouterStatus"

  /ai-router/models:
    get:
      operationId: listAvailableModels
      tags: [ai-router]
      summary: List all available models (local and cloud)
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"

  /ai-router/infer:
    post:
      operationId: routeInference
      tags: [ai-router]
      summary: Route an inference request to the best available model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"

  /ai-router/mode:
    get:
      operationId: getIntelligenceMode
      tags: [ai-router]
      summary: Get current intelligence mode
      responses:
        "200":
          description: Current intelligence mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceMode"
    put:
      operationId: setIntelligenceMode
      tags: [ai-router]
      summary: Set intelligence mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetIntelligenceModeRequest"
      responses:
        "200":
          description: Updated intelligence mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceMode"

  /plugins:
    get:
      operationId: listPlugins
      tags: [plugins]
      summary: List all registered plugins/skills
      responses:
        "200":
          description: List of plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginList"

  /plugins/{pluginId}:
    get:
      operationId: getPlugin
      tags: [plugins]
      summary: Get plugin details
      parameters:
        - name: pluginId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"
        "404":
          description: Plugin not found

  /plugins/{pluginId}/toggle:
    post:
      operationId: togglePlugin
      tags: [plugins]
      summary: Enable or disable a plugin
      parameters:
        - name: pluginId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TogglePluginRequest"
      responses:
        "200":
          description: Updated plugin state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plugin"

  /plugins/{pluginId}/execute:
    post:
      operationId: executePluginCommand
      tags: [plugins]
      summary: Execute a command on a plugin
      parameters:
        - name: pluginId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginCommandRequest"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginCommandResult"

  /memory/short-term:
    get:
      operationId: getShortTermMemory
      tags: [memory]
      summary: Get current session memory
      responses:
        "200":
          description: Short-term session memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStore"
    post:
      operationId: storeShortTermMemory
      tags: [memory]
      summary: Store a new short-term memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryCreate"
      responses:
        "201":
          description: Memory stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"

  /memory/long-term:
    get:
      operationId: getLongTermMemory
      tags: [memory]
      summary: Search long-term persistent memory
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Long-term memory results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStore"
    post:
      operationId: storeLongTermMemory
      tags: [memory]
      summary: Store a new long-term memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryCreate"
      responses:
        "201":
          description: Memory stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"

  /memory/long-term/{id}:
    delete:
      operationId: deleteMemoryEntry
      tags: [memory]
      summary: Delete a memory entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Memory deleted

  /memory/search:
    get:
      operationId: searchMemory
      tags: [memory]
      summary: Keyword-based search across all memory entries
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Keyword or phrase to search for
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySearchResult"

  /memory/recent:
    get:
      operationId: getRecentMemory
      tags: [memory]
      summary: Get the most recent memory entries across all types
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStore"

  /memory:
    post:
      operationId: storeMemory
      tags: [memory]
      summary: Manually inject a memory entry (short-term or long-term)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInjectRequest"
      responses:
        "201":
          description: Memory entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"

  /memory/{id}:
    delete:
      operationId: deleteMemoryById
      tags: [memory]
      summary: Delete a memory entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Memory deleted

  /system/stats:
    get:
      operationId: getSystemStats
      tags: [system]
      summary: Get live system stats (CPU, memory, uptime, network)
      responses:
        "200":
          description: System statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"

  /system/events:
    get:
      operationId: getSystemEvents
      tags: [system]
      summary: Get recent system events and alerts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Recent system events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemEventList"

  /system/summary:
    get:
      operationId: getSystemSummary
      tags: [system]
      summary: Get a high-level system summary for dashboard
      responses:
        "200":
          description: System summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSummary"

  /commands:
    get:
      operationId: listCommands
      tags: [commands]
      summary: List all available commands
      responses:
        "200":
          description: Available commands
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandList"
    post:
      operationId: dispatchCommand
      tags: [commands]
      summary: Dispatch a command through the skill router
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandDispatchRequest"
      responses:
        "200":
          description: Command dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"

  /commands/history:
    get:
      operationId: getCommandHistory
      tags: [commands]
      summary: Get recent command history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Command history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandHistoryList"

  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List all connected/simulated devices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceList"

  /devices/{deviceId}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get device details and sensor readings
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /devices/{deviceId}/control:
    post:
      operationId: controlDevice
      tags: [devices]
      summary: Send a control command to a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceControlRequest"
      responses:
        "200":
          description: Control result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceControlResult"

  /events/history:
    get:
      operationId: getEventHistory
      tags: [events]
      summary: Get paginated event bus history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: type
          in: query
          schema:
            type: string
          description: Filter by event type
        - name: source
          in: query
          schema:
            type: string
          description: Filter by event source
      responses:
        "200":
          description: Event history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventHistoryResponse"

  /devices/{deviceId}/command:
    post:
      operationId: sendDeviceCommand
      tags: [devices]
      summary: Send a command to a device via the event bus
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCommandRequest"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCommandResult"
        "404":
          description: Device not found

  /devices/{deviceId}/history:
    get:
      operationId: getDeviceHistory
      tags: [devices]
      summary: Get reading history for a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device reading history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceHistory"
        "404":
          description: Device not found

  /devices/stats:
    get:
      operationId: getDeviceStats
      tags: [devices]
      summary: Aggregated device statistics
      responses:
        "200":
          description: Device statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AiRouterStatus:
      type: object
      properties:
        mode:
          type: string
          enum: [DIRECT_EXECUTION, LIGHT_REASONING, DEEP_REASONING, HYBRID_MODE]
        activeModel:
          type: string
          nullable: true
        ollamaAvailable:
          type: boolean
        cloudAvailable:
          type: boolean
        fallbackMode:
          type: boolean
        cacheHitRate:
          type: number
        totalRequests:
          type: integer
        lastDetectedAt:
          type: string
          format: date-time
      required:
        - mode
        - ollamaAvailable
        - cloudAvailable
        - fallbackMode
        - cacheHitRate
        - totalRequests
        - lastDetectedAt

    ModelList:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
      required:
        - models

    ModelInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [local_ollama, local_llamacpp, openai_compatible, rule_engine]
        available:
          type: boolean
        contextLength:
          type: integer
        speed:
          type: string
          enum: [fast, medium, slow]
        tier:
          type: string
          enum: [light, deep, fallback]
        endpoint:
          type: string
          nullable: true
      required:
        - id
        - name
        - type
        - available
        - speed
        - tier

    InferenceRequest:
      type: object
      properties:
        prompt:
          type: string
        mode:
          type: string
          enum: [fast, deep, none]
        pluginId:
          type: string
          nullable: true
        context:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
            required:
              - role
              - content
        useCache:
          type: boolean
          default: true
      required:
        - prompt
        - mode

    InferenceResponse:
      type: object
      properties:
        response:
          type: string
        modelUsed:
          type: string
        mode:
          type: string
        fromCache:
          type: boolean
        latencyMs:
          type: integer
        tokens:
          type: integer
          nullable: true
      required:
        - response
        - modelUsed
        - mode
        - fromCache
        - latencyMs

    IntelligenceMode:
      type: object
      properties:
        mode:
          type: string
          enum: [DIRECT_EXECUTION, LIGHT_REASONING, DEEP_REASONING, HYBRID_MODE]
        description:
          type: string
        preferLocal:
          type: boolean
      required:
        - mode
        - description
        - preferLocal

    SetIntelligenceModeRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [DIRECT_EXECUTION, LIGHT_REASONING, DEEP_REASONING, HYBRID_MODE]
      required:
        - mode

    PluginList:
      type: object
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/Plugin"
      required:
        - plugins

    Plugin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        enabled:
          type: boolean
        status:
          type: string
          enum: [active, inactive, error, loading]
        commands:
          type: array
          items:
            type: string
        category:
          type: string
        lastActivity:
          type: string
          format: date-time
          nullable: true
        errorMessage:
          type: string
          nullable: true
      required:
        - id
        - name
        - description
        - version
        - enabled
        - status
        - commands
        - category

    TogglePluginRequest:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled

    PluginCommandRequest:
      type: object
      properties:
        command:
          type: string
        args:
          type: object
          additionalProperties: true
        mode:
          type: string
          enum: [fast, deep, none]
          default: none
      required:
        - command

    PluginCommandResult:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        executionTimeMs:
          type: integer
        modelUsed:
          type: string
          nullable: true
      required:
        - success
        - output
        - executionTimeMs

    MemoryStore:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        total:
          type: integer
      required:
        - entries
        - total

    MemoryEntry:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [short_term, long_term]
        content:
          type: string
        keywords:
          type: array
          items:
            type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - type
        - content
        - keywords
        - source
        - createdAt

    MemoryEntryCreate:
      type: object
      properties:
        content:
          type: string
        keywords:
          type: array
          items:
            type: string
        source:
          type: string
        ttlSeconds:
          type: integer
          nullable: true
      required:
        - content
        - keywords
        - source

    MemorySearchResult:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        total:
          type: integer
        query:
          type: string
      required:
        - entries
        - total
        - query

    MemoryInjectRequest:
      type: object
      properties:
        content:
          type: string
        keywords:
          type: array
          items:
            type: string
        source:
          type: string
        type:
          type: string
          enum: [short_term, long_term]
          default: short_term
        ttlSeconds:
          type: integer
          nullable: true
      required:
        - content
        - source
        - type

    SystemStats:
      type: object
      properties:
        cpu:
          type: object
          properties:
            usage:
              type: number
            cores:
              type: integer
            model:
              type: string
          required:
            - usage
            - cores
            - model
        memory:
          type: object
          properties:
            used:
              type: integer
            total:
              type: integer
            percentage:
              type: number
          required:
            - used
            - total
            - percentage
        uptime:
          type: integer
        loadAverage:
          type: array
          items:
            type: number
        platform:
          type: string
        hostname:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - cpu
        - memory
        - uptime
        - loadAverage
        - platform
        - hostname
        - timestamp

    SystemEventList:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/SystemEvent"
      required:
        - events

    SystemEvent:
      type: object
      properties:
        id:
          type: string
        level:
          type: string
          enum: [info, warning, error, critical]
        message:
          type: string
        source:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - id
        - level
        - message
        - source
        - timestamp

    SystemSummary:
      type: object
      properties:
        status:
          type: string
          enum: [optimal, degraded, critical, offline]
        activePlugins:
          type: integer
        totalPlugins:
          type: integer
        activeDevices:
          type: integer
        totalDevices:
          type: integer
        memoryEntries:
          type: integer
        commandsToday:
          type: integer
        aiRequests:
          type: integer
        uptimeSeconds:
          type: integer
        alertCount:
          type: integer
      required:
        - status
        - activePlugins
        - totalPlugins
        - activeDevices
        - totalDevices
        - memoryEntries
        - commandsToday
        - aiRequests
        - uptimeSeconds
        - alertCount

    CommandList:
      type: object
      properties:
        commands:
          type: array
          items:
            $ref: "#/components/schemas/CommandDef"
      required:
        - commands

    CommandDef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        plugin:
          type: string
        syntax:
          type: string
        examples:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - description
        - plugin
        - syntax
        - examples

    CommandDispatchRequest:
      type: object
      properties:
        input:
          type: string
        mode:
          type: string
          enum: [DIRECT_EXECUTION, LIGHT_REASONING, DEEP_REASONING, HYBRID_MODE, auto]
          default: auto
        context:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - input

    CommandResult:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
        plugin:
          type: string
          nullable: true
        command:
          type: string
          nullable: true
        executionTimeMs:
          type: integer
        modeUsed:
          type: string
        aiAssisted:
          type: boolean
        timestamp:
          type: string
          format: date-time
      required:
        - success
        - output
        - executionTimeMs
        - modeUsed
        - aiAssisted
        - timestamp

    CommandHistoryList:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/CommandHistoryEntry"
        total:
          type: integer
      required:
        - history
        - total

    CommandHistoryEntry:
      type: object
      properties:
        id:
          type: string
        input:
          type: string
        output:
          type: string
        success:
          type: boolean
        plugin:
          type: string
          nullable: true
        executionTimeMs:
          type: integer
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - input
        - output
        - success
        - executionTimeMs
        - timestamp

    DeviceList:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
      required:
        - devices

    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [sensor, actuator, display, network, simulated]
        status:
          type: string
          enum: [online, offline, error, standby]
        protocol:
          type: string
          enum: [mqtt, websocket, http, simulated]
        readings:
          type: array
          items:
            $ref: "#/components/schemas/DeviceReading"
        capabilities:
          type: array
          items:
            type: string
        lastSeen:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
          nullable: true
      required:
        - id
        - name
        - type
        - status
        - protocol
        - readings
        - capabilities

    DeviceReading:
      type: object
      properties:
        sensor:
          type: string
        value:
          oneOf:
            - type: number
            - type: string
            - type: boolean
        unit:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
      required:
        - sensor
        - value
        - timestamp

    DeviceControlRequest:
      type: object
      properties:
        action:
          type: string
        parameters:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - action

    DeviceControlResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        newState:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - success
        - message

    DeviceCommandRequest:
      type: object
      properties:
        action:
          type: string
        parameters:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - action

    DeviceCommandResult:
      type: object
      properties:
        success:
          type: boolean
        deviceId:
          type: string
        action:
          type: string
        message:
          type: string
      required:
        - success
        - deviceId
        - action
        - message

    DeviceHistory:
      type: object
      properties:
        deviceId:
          type: string
        history:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/DeviceReading"
        total:
          type: integer
      required:
        - deviceId
        - history
        - total

    DeviceStats:
      type: object
      properties:
        total:
          type: integer
        online:
          type: integer
        offline:
          type: integer
        error:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
      required:
        - total
        - online
        - offline
        - error
        - byType

    EventHistoryEntry:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        source:
          type: string
        level:
          type: string
        payload:
          type: object
          additionalProperties: true
          nullable: true
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - source
        - level
        - timestamp

    EventHistoryResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventHistoryEntry"
        limit:
          type: integer
        offset:
          type: integer
      required:
        - events
        - limit
        - offset
